[build]
command = ""
publish = "."

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.jpg"
  [headers.values]
  Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/*.png"
  [headers.values]
  Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
