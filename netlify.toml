[build]
command = ""
publish = "."

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.jpg"
  [headers.values]
  Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.png"
  [headers.values]
  Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.pdf"
  [headers.values]
  Cache-Control = "public, max-age=604800"

[[headers]]
for = "/index.html"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"
