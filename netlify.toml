[build]
  # Run the Vite build, then remove any files with '#' or '?' characters
  # from the output directory. This prevents Netlify from rejecting the
  # deployment due to encoded Unicode characters in filenames (e.g.,
  # diacritics encoded as #U010d). The `find` command will delete
  # offending files after the build completes. Ensure that the `_redirects`
  # file from the `public` folder is copied to `dist` during the build.
  # Perform the build using Vite. After the build finishes, if the
  # `dist` directory exists, remove any generated files whose names contain
  # the '#' or '?' characters. Restrict the search to files (-type f)
  # to avoid deleting the `dist` directory itself or other directories.
  # Run the build script and, if the `dist` directory exists, remove any files
  # whose names contain a literal `#` character. We avoid using a wildcard for
  # `?` because in shell globbing `?` matches any single character, which would
  # unintentionally match all files and delete the entire build output. Since
  # the offending filenames were due to unicode characters being percent-encoded
  # with sequences like `#U010d`, we only need to target `#`.
  command = "npm run build && [ -d dist ] && find dist -type f -name '*#*' -delete || true"
  publish = "dist"